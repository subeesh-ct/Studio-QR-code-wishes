<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>WishLink Studio · Your Surprise</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- canvas-confetti -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1/dist/confetti.browser.min.js"></script>

  <style>
    :root {
      --accent: #f59e0b;
      --accent-dark: #b45309;
    }
    .cursive-font {
      font-family: 'Great Vibes', cursive;
    }
    .text-shadow {
      text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
    }
    /* Audio player customisation */
    .progress-fill {
      background-color: var(--accent);
    }
    .play-btn {
      background-color: var(--accent);
      color: white;
    }
    .play-btn:hover {
      background-color: var(--accent-dark);
    }
    .audio-player {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.2);
    }
    /* Polaroid frame */
    .polaroid {
      background: white;
      padding: 12px 12px 40px 12px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.3);
      transform: rotate(-2deg);
      transition: transform 0.3s;
      max-width: 340px;
    }
    .polaroid:hover {
      transform: rotate(0deg) scale(1.02);
    }
    .polaroid img {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 6px;
    }
    .name-overlay {
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.65);
      color: white;
      padding: 4px 16px;
      border-radius: 9999px;
      font-size: 2rem;
      line-height: 1.2;
      backdrop-filter: blur(4px);
    }
    /* Floating items */
    @keyframes floatUp {
      0% { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
    }
    .floating-item {
      position: absolute;
      animation: floatUp 10s linear infinite;
      pointer-events: none;
      font-size: 2rem;
    }
    @keyframes fall {
      to { transform: translateY(100vh); }
    }
    .snowflake {
      position: absolute;
      color: white;
      font-size: 1.5rem;
      animation: fall linear infinite;
      pointer-events: none;
    }
    /* Overlay & main transitions */
    #surpriseOverlay {
      transition: opacity 0.8s ease;
    }
    #surpriseOverlay.hidden {
      opacity: 0;
      pointer-events: none;
    }
    #mainContent {
      opacity: 0;
      transition: opacity 1s ease;
    }
    #mainContent.show {
      opacity: 1;
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center relative overflow-hidden" id="body">

  <!-- Surprise Overlay -->
  <div id="surpriseOverlay" class="absolute inset-0 z-50 flex flex-col items-center justify-center bg-gradient-to-br from-indigo-900 to-purple-900 cursor-pointer">
    <i class="fas fa-gift text-7xl text-yellow-400 animate-bounce mb-4 drop-shadow-lg"></i>
    <p class="text-white text-2xl font-bold tracking-wide" id="surpriseText">Your Surprise is Ready! Tap to Open</p>
  </div>

  <!-- Main Content -->
  <div id="mainContent" class="w-full max-w-7xl mx-auto px-4 py-12 relative z-10">
    <div class="flex flex-col md:flex-row items-center md:items-start gap-10">
      <!-- Image Polaroid (left on desktop, top on mobile) -->
      <div id="imageCol" class="md:w-1/2 w-full flex justify-center hidden">
        <div class="polaroid relative mx-auto">
          <img id="polaroidImg" src="" alt="Surprise image">
          <div class="name-overlay cursive-font" id="polaroidName">Name</div>
        </div>
      </div>

      <!-- Greeting & Audio (right on desktop) -->
      <div id="greetingCol" class="md:w-1/2 w-full flex flex-col justify-center space-y-6 text-center md:text-left">
        <p id="occasionText" class="text-xl uppercase tracking-[0.3em] font-semibold" style="color: var(--accent)"></p>
        <h1 id="nameText" class="cursive-font text-7xl md:text-7xl text-white text-shadow leading-tight"></h1>
        <p id="messageText" class="text-lg md:text-xl text-gray-200 leading-relaxed font-light"></p>

        <!-- Custom Audio Player -->
        <div id="audioPlayer" class="audio-player flex items-center gap-3 py-3 px-5 rounded-full hidden w-full max-w-lg mx-auto md:mx-0">
          <button id="playBtn" class="play-btn rounded-full w-11 h-11 flex items-center justify-center text-xl shadow-lg">
            <i class="fas fa-play"></i>
          </button>
          <div class="flex-1 h-2 bg-gray-300/30 rounded-full cursor-pointer relative" id="progressBarContainer">
            <div class="absolute top-0 left-0 h-2 rounded-full progress-fill transition-all duration-100" id="progressFill" style="width:0%"></div>
          </div>
          <div class="text-white text-sm flex items-center gap-1">
            <span id="currentTime">0:00</span>
            <span>/</span>
            <span id="duration">0:00</span>
          </div>
          <div id="loadingIndicator" class="hidden text-white text-sm whitespace-nowrap">
            <i class="fas fa-spinner fa-pulse mr-1"></i>Loading...
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Hidden audio element -->
  <audio id="audioElement" preload="auto"></audio>

  <script>
    (function() {
      // ---------- URL Parsing & Redirect ----------
      const params = new URLSearchParams(window.location.search);
      const name = params.get('name');
      const msg = params.get('msg');
      if (!name || !msg) {
        window.location.href = 'https://example.com';
        return;
      }
      const occasion = params.get('occ') || 'Special Day';
      const theme = params.get('theme') || '';
      const imgUrl = params.get('img') || null;
      const audioUrl = params.get('audio') || null;

      // ---------- DOM Elements ----------
      const surpriseOverlay = document.getElementById('surpriseOverlay');
      const mainContent = document.getElementById('mainContent');
      const imageCol = document.getElementById('imageCol');
      const polaroidImg = document.getElementById('polaroidImg');
      const polaroidName = document.getElementById('polaroidName');
      const occasionText = document.getElementById('occasionText');
      const nameText = document.getElementById('nameText');
      const messageText = document.getElementById('messageText');
      const audioPlayerDiv = document.getElementById('audioPlayer');
      const audioEl = document.getElementById('audioElement');
      const playBtn = document.getElementById('playBtn');
      const progressFill = document.getElementById('progressFill');
      const progressBarContainer = document.getElementById('progressBarContainer');
      const currentTimeSpan = document.getElementById('currentTime');
      const durationSpan = document.getElementById('duration');
      const loadingIndicator = document.getElementById('loadingIndicator');

      // ---------- Populate Data ----------
      polaroidName.textContent = name;
      nameText.textContent = name;
      occasionText.textContent = occasion.toUpperCase();
      messageText.textContent = msg;

      if (imgUrl) {
        imageCol.classList.remove('hidden');
        polaroidImg.src = imgUrl;
      } else {
        // If no image, greeting takes full width and centers
        document.getElementById('greetingCol').classList.remove('md:w-1/2');
        document.getElementById('greetingCol').classList.add('md:w-full', 'text-center', 'items-center');
      }

      // ---------- Dynamic Occasion Theme ----------
      function applyOccasionTheme(occ) {
        const root = document.documentElement;
        const body = document.body;
        let gradient, accent, accentDark, startAnimation;
        const occLower = occ.toLowerCase().replace(/'/g,'');

        if (occLower.includes('birthday')) {
          gradient = 'linear-gradient(135deg, #ff6b6b, #feca57, #ff9ff3)';
          accent = '#ff6b6b'; accentDark = '#c0392b';
          startAnimation = startBirthday;
        } else if (occLower.includes('diwali')) {
          gradient = 'linear-gradient(135deg, #1a1a2e, #3c096c, #ffb703)';
          accent = '#f39c12'; accentDark = '#d35400';
          startAnimation = startDiwali;
        } else if (occLower.includes('christmas')) {
          gradient = 'linear-gradient(135deg, #2d3436, #c0392b, #27ae60)';
          accent = '#c0392b'; accentDark = '#a93226';
          startAnimation = startChristmas;
        } else if (occLower.includes('pongal') || occLower.includes('festival')) {
          gradient = 'linear-gradient(135deg, #f1c40f, #e67e22, #27ae60)';
          accent = '#e67e22'; accentDark = '#b85e0c';
          startAnimation = startFestival;
        } else if (occLower.includes('anniversary') || occLower.includes('wedding') || occLower.includes('valentine')) {
          gradient = 'linear-gradient(135deg, #ff758c, #ff7eb3, #ffd700)';
          accent = '#ff7eb3'; accentDark = '#e84393';
          startAnimation = startRomantic;
        } else {
          // Default premium neutral
          gradient = 'linear-gradient(135deg, #0f0c29, #302b63, #24243e)';
          accent = '#a29bfe'; accentDark = '#6c5ce7';
          startAnimation = startDefault;
        }

        body.style.background = gradient;
        root.style.setProperty('--accent', accent);
        root.style.setProperty('--accent-dark', accentDark);
        return startAnimation;
      }

      const startOccasionAnimation = applyOccasionTheme(occasion);

      // ---------- Surprise Screen Interaction ----------
      surpriseOverlay.addEventListener('click', () => {
        // First burst
        confetti({
          particleCount: 150,
          spread: 70,
          origin: { y: 0.6, x: 0.5 }
        });
        // Fade overlay, show main content, start continuous animation
        setTimeout(() => {
          surpriseOverlay.classList.add('hidden');
          mainContent.classList.add('show');
          startOccasionAnimation();
        }, 700);
      });

      // ---------- Continuous Occasion Animations ----------
      function startBirthday() {
        setInterval(() => {
          confetti({ particleCount: 20, spread: 40, origin: { y: 0.7, x: Math.random() } });
        }, 3000);
        setInterval(() => {
          const balloon = document.createElement('div');
          balloon.className = 'floating-item';
          balloon.textContent = '🎈';
          balloon.style.left = Math.random() * 100 + '%';
          balloon.style.animationDuration = (Math.random() * 5 + 5) + 's';
          balloon.style.fontSize = (Math.random() * 2 + 2) + 'rem';
          document.body.appendChild(balloon);
          setTimeout(() => balloon.remove(), 10000);
        }, 1500);
      }

      function startDiwali() {
        function firework() {
          confetti({
            particleCount: 100,
            spread: 120,
            origin: { x: 0.5, y: 0.5 },
            angle: 270,
            startVelocity: 50,
            colors: ['#f39c12', '#e74c3c', '#f1c40f', '#ff6348'],
            shapes: ['circle', 'star']
          });
        }
        firework();
        setInterval(firework, 2500);
        setInterval(() => {
          const diya = document.createElement('div');
          diya.className = 'floating-item';
          diya.textContent = '🪔';
          diya.style.left = Math.random() * 100 + '%';
          diya.style.animationDuration = (Math.random() * 6 + 6) + 's';
          document.body.appendChild(diya);
          setTimeout(() => diya.remove(), 10000);
        }, 2000);
      }

      function startChristmas() {
        function createSnow() {
          const snow = document.createElement('div');
          snow.className = 'snowflake';
          snow.textContent = '❄️';
          snow.style.left = Math.random() * 100 + '%';
          snow.style.animationDuration = (Math.random() * 5 + 5) + 's';
          snow.style.fontSize = (Math.random() * 1 + 1.2) + 'rem';
          document.body.appendChild(snow);
          setTimeout(() => snow.remove(), 10000);
        }
        setInterval(createSnow, 250);
        setInterval(() => {
          confetti({
            particleCount: 15,
            spread: 60,
            origin: { y: 0.2, x: Math.random() },
            colors: ['#ffffff', '#dfe6e9'],
            shapes: ['circle'],
            gravity: 0.7
          });
        }, 4000);
      }

      function startFestival() {
        setInterval(() => {
          confetti({ particleCount: 20, spread: 45, origin: { y: 0.6, x: Math.random() }, colors: ['#f1c40f', '#e67e22', '#2ecc71'] });
        }, 3000);
        setInterval(() => {
          const flower = document.createElement('div');
          flower.className = 'floating-item';
          flower.textContent = '🌺';
          flower.style.left = Math.random() * 100 + '%';
          flower.style.animationDuration = (Math.random() * 6 + 6) + 's';
          document.body.appendChild(flower);
          setTimeout(() => flower.remove(), 10000);
        }, 2000);
      }

      function startRomantic() {
        setInterval(() => {
          const heart = document.createElement('div');
          heart.className = 'floating-item';
          heart.textContent = '❤️';
          heart.style.left = Math.random() * 100 + '%';
          heart.style.animationDuration = (Math.random() * 5 + 5) + 's';
          heart.style.fontSize = (Math.random() * 1.5 + 1.5) + 'rem';
          document.body.appendChild(heart);
          setTimeout(() => heart.remove(), 8000);
        }, 1200);
        setInterval(() => {
          confetti({ particleCount: 12, spread: 30, origin: { y: 0.5, x: Math.random() }, colors: ['#ff758c', '#ff7eb3'], shapes: ['heart'] });
        }, 2500);
      }

      function startDefault() {
        setInterval(() => {
          confetti({ particleCount: 10, spread: 40, origin: { y: 0.6, x: Math.random() }, colors: ['#a29bfe', '#6c5ce7'] });
        }, 4000);
      }

      // ---------- Custom Audio Player ----------
      if (audioUrl) {
        audioPlayerDiv.classList.remove('hidden');
        audioEl.src = audioUrl;
        let loading = false;

        function updateTimeDisplay() {
          if (audioEl.duration) {
            const percent = (audioEl.currentTime / audioEl.duration) * 100;
            progressFill.style.width = percent + '%';
            currentTimeSpan.textContent = formatTime(audioEl.currentTime);
            durationSpan.textContent = formatTime(audioEl.duration);
          }
        }

        function formatTime(sec) {
          const m = Math.floor(sec / 60);
          const s = Math.floor(sec % 60);
          return `${m}:${s < 10 ? '0' : ''}${s}`;
        }

        playBtn.addEventListener('click', () => {
          audioEl.paused ? audioEl.play() : audioEl.pause();
        });

        audioEl.addEventListener('play', () => {
          playBtn.innerHTML = '<i class="fas fa-pause"></i>';
          loading = false;
          loadingIndicator.classList.add('hidden');
        });
        audioEl.addEventListener('pause', () => {
          playBtn.innerHTML = '<i class="fas fa-play"></i>';
        });
        audioEl.addEventListener('waiting', () => {
          loading = true;
          loadingIndicator.classList.remove('hidden');
          playBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i>';
        });
        audioEl.addEventListener('playing', () => {
          loading = false;
          loadingIndicator.classList.add('hidden');
          playBtn.innerHTML = '<i class="fas fa-pause"></i>';
        });
        audioEl.addEventListener('timeupdate', updateTimeDisplay);
        audioEl.addEventListener('loadedmetadata', () => {
          durationSpan.textContent = formatTime(audioEl.duration);
        });
        progressBarContainer.addEventListener('click', (e) => {
          const rect = progressBarContainer.getBoundingClientRect();
          const clickX = e.clientX - rect.left;
          const width = rect.width;
          if (audioEl.duration) {
            audioEl.currentTime = (clickX / width) * audioEl.duration;
          }
        });
      }
    })();
  </script>
</body>
</html>
