<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>WishLink Studio · Your Surprise</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- canvas-confetti -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1/dist/confetti.browser.min.js"></script>

  <style>
    :root {
      --accent: #f59e0b;
    }
    .font-cursive {
      font-family: 'Great Vibes', cursive;
    }
    .font-body {
      font-family: 'Poppins', sans-serif;
    }
    .text-glow {
      text-shadow: 0 0 30px rgba(255,215,0,0.7), 0 0 60px rgba(255,255,255,0.3);
    }
    /* Polaroid frame */
    .polaroid {
      background: white;
      padding: 0.8rem 0.8rem 2.5rem 0.8rem;
      box-shadow: 0 30px 45px rgba(0,0,0,0.4);
      transform: rotate(-2deg);
      transition: transform 0.3s ease;
      border-radius: 0.5rem;
    }
    .polaroid:hover {
      transform: rotate(0deg) scale(1.02);
    }
    .polaroid img {
      width: 100%;
      height: auto;
      border-radius: 0.4rem;
      display: block;
    }
    .name-overlay {
      position: absolute;
      bottom: 0.4rem;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(6px);
      color: white;
      padding: 0.2rem 1.2rem;
      border-radius: 9999px;
      font-size: 1.5rem;
      white-space: nowrap;
    }
    /* Floating animations */
    @keyframes floatUp {
      0% { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
    }
    .floating-item {
      position: fixed;
      animation: floatUp 9s linear infinite;
      pointer-events: none;
      z-index: 30;
    }
    @keyframes fall {
      to { transform: translateY(100vh) rotate(360deg); }
    }
    .snowflake {
      position: fixed;
      color: white;
      font-size: 1.5rem;
      animation: fall linear infinite;
      pointer-events: none;
      z-index: 30;
    }
    /* Progress bar */
    .progress-fill {
      background-color: var(--accent);
      box-shadow: 0 0 8px var(--accent);
    }
    /* Surprise overlay */
    @keyframes pulse-glow {
      0%, 100% { text-shadow: 0 0 15px #ffd700, 0 0 30px #ff8c00; }
      50% { text-shadow: 0 0 25px #ffd700, 0 0 50px #ff4500; }
    }
    .surprise-icon {
      animation: pulse-glow 2s infinite ease-in-out;
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center relative overflow-hidden font-body bg-black">
  <!-- Surprise Overlay -->
  <div id="surpriseOverlay" class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-black/80 backdrop-blur-md cursor-pointer transition-all duration-1000">
    <i class="fas fa-gift text-8xl text-yellow-400 mb-6 surprise-icon drop-shadow-2xl"></i>
    <p class="text-white text-3xl md:text-4xl font-bold tracking-widest text-center px-4 text-shadow">
      Your Surprise is Ready!<br>
      <span class="text-xl mt-2 block font-normal">Tap to Open</span>
    </p>
  </div>

  <!-- Main Content Container -->
  <div id="mainContent" class="relative z-10 w-full max-w-7xl mx-auto px-4 py-10 opacity-0 transition-all duration-1000 transform translate-y-6">
    <div class="flex flex-col md:flex-row items-center justify-between gap-8">
      <!-- Image Column (Polaroid) -->
      <div id="imageCol" class="md:w-1/2 w-full flex justify-center mb-6 md:mb-0 hidden">
        <div class="polaroid relative max-w-xs md:max-w-sm mx-auto">
          <img id="polaroidImg" src="" alt="Surprise Image">
          <div class="name-overlay font-cursive" id="polaroidName">Name</div>
        </div>
      </div>

      <!-- Text & Audio Column -->
      <div id="textCol" class="md:w-1/2 w-full flex flex-col space-y-6 text-center md:text-left">
        <p id="occasionText" class="text-lg uppercase tracking-[0.3em] font-semibold" style="color: var(--accent)"></p>
        <h1 id="nameText" class="font-cursive text-7xl md:text-8xl text-white text-glow leading-none"></h1>
        <p id="messageText" class="text-xl md:text-2xl text-gray-200 leading-relaxed font-medium"></p>

        <!-- Custom Audio Player -->
        <div id="audioPlayer" class="hidden flex items-center gap-4 bg-white/10 backdrop-blur-md border border-white/20 rounded-full py-3 px-5 w-full max-w-md mx-auto md:mx-0 shadow-xl">
          <button id="playBtn" class="rounded-full w-12 h-12 flex items-center justify-center text-2xl shadow-lg transition-transform hover:scale-105" style="background-color: var(--accent); color: white;">
            <i class="fas fa-play"></i>
          </button>
          <div class="flex-1 h-2 bg-white/30 rounded-full cursor-pointer relative" id="progressBarContainer">
            <div class="absolute top-0 left-0 h-2 rounded-full progress-fill transition-all duration-150" id="progressFill" style="width:0%"></div>
          </div>
          <div class="text-white text-sm font-semibold flex items-center gap-1">
            <span id="currentTime">0:00</span><span>/</span><span id="duration">0:00</span>
          </div>
          <div id="loadingIndicator" class="hidden text-white text-sm ml-2">
            <i class="fas fa-spinner fa-pulse"></i> Loading...
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Hidden Audio -->
  <audio id="audioElement" preload="auto"></audio>

  <script>
    (function() {
      // ---------- URL Parsing & Redirect ----------
      const params = new URLSearchParams(window.location.search);
      const name = params.get('name');
      const msg = params.get('msg');
      if (!name || !msg) {
        window.location.href = 'https://example.com';
        return;
      }
      const occasion = params.get('occ') || 'Custom';
      const theme = params.get('theme') || '';
      const imgUrl = params.get('img') || null;
      const audioUrl = params.get('audio') || null;

      // ---------- DOM Elements ----------
      const body = document.body;
      const surpriseOverlay = document.getElementById('surpriseOverlay');
      const mainContent = document.getElementById('mainContent');
      const imageCol = document.getElementById('imageCol');
      const polaroidImg = document.getElementById('polaroidImg');
      const polaroidName = document.getElementById('polaroidName');
      const occasionText = document.getElementById('occasionText');
      const nameText = document.getElementById('nameText');
      const messageText = document.getElementById('messageText');
      const audioPlayerDiv = document.getElementById('audioPlayer');
      const audioEl = document.getElementById('audioElement');
      const playBtn = document.getElementById('playBtn');
      const progressFill = document.getElementById('progressFill');
      const progressBarContainer = document.getElementById('progressBarContainer');
      const currentTimeSpan = document.getElementById('currentTime');
      const durationSpan = document.getElementById('duration');
      const loadingIndicator = document.getElementById('loadingIndicator');

      // ---------- Populate Data ----------
      polaroidName.textContent = name;
      nameText.textContent = name;
      occasionText.textContent = occasion.toUpperCase();
      messageText.textContent = msg;

      if (imgUrl) {
        imageCol.classList.remove('hidden');
        polaroidImg.src = imgUrl;
      } else {
        // If no image, make text column full width and centered
        document.getElementById('textCol').classList.remove('md:w-1/2');
        document.getElementById('textCol').classList.add('md:w-full', 'text-center', 'items-center');
      }

      // ---------- Dynamic Occasion Theme ----------
      const occasionStyles = {
        'birthday': {
          gradient: 'radial-gradient(circle at top, #ff6b6b, #c0392b)',
          accent: '#ff6b6b',
          animation: startBirthday
        },
        'anniversary': {
          gradient: 'radial-gradient(circle at top, #ff758c, #e84393)',
          accent: '#ff7eb3',
          animation: startRomantic
        },
        'wedding': {
          gradient: 'radial-gradient(circle at top, #fbc2eb, #a6c1ee)',
          accent: '#d4af37',
          animation: startRomantic
        },
        'graduation': {
          gradient: 'radial-gradient(circle at top, #2c3e50, #8e44ad)',
          accent: '#f39c12',
          animation: startDefault
        },
        'farewell': {
          gradient: 'radial-gradient(circle at top, #5c258d, #4389a2)',
          accent: '#9b59b6',
          animation: startDefault
        },
        "valentine's day": {
          gradient: 'radial-gradient(circle at top, #ff5e7e, #ff99ac)',
          accent: '#ff5e7e',
          animation: startRomantic
        },
        "mother's day": {
          gradient: 'radial-gradient(circle at top, #f9d5e5, #eeac99)',
          accent: '#f06292',
          animation: startDefault
        },
        "father's day": {
          gradient: 'radial-gradient(circle at top, #2c3e50, #3498db)',
          accent: '#3498db',
          animation: startDefault
        },
        'diwali': {
          gradient: 'radial-gradient(circle at top, #1a1a2e, #3c096c)',
          accent: '#f39c12',
          animation: startDiwali
        },
        'pongal': {
          gradient: 'radial-gradient(circle at top, #f1c40f, #e67e22)',
          accent: '#e67e22',
          animation: startFestival
        },
        'eid': {
          gradient: 'radial-gradient(circle at top, #27ae60, #f1c40f)',
          accent: '#27ae60',
          animation: startDefault
        },
        'christmas': {
          gradient: 'radial-gradient(circle at top, #2d3436, #c0392b)',
          accent: '#e74c3c',
          animation: startChristmas
        },
        'new year': {
          gradient: 'radial-gradient(circle at top, #f1c40f, #e74c3c)',
          accent: '#f1c40f',
          animation: startDefault
        },
        'congratulations': {
          gradient: 'radial-gradient(circle at top, #2ecc71, #3498db)',
          accent: '#2ecc71',
          animation: startDefault
        },
        'get well soon': {
          gradient: 'radial-gradient(circle at top, #1abc9c, #16a085)',
          accent: '#1abc9c',
          animation: startDefault
        },
        'custom': {
          gradient: 'radial-gradient(circle at top, #0f0c29, #302b63, #24243e)',
          accent: '#a29bfe',
          animation: startDefault
        }
      };

      // Get occasion config or default to custom
      let config = occasionStyles[occasion.toLowerCase()] || occasionStyles['custom'];
      document.documentElement.style.setProperty('--accent', config.accent);
      body.style.background = config.gradient;
      const startAnimation = config.animation;

      // ---------- Surprise Interaction ----------
      surpriseOverlay.addEventListener('click', () => {
        confetti({ particleCount: 120, spread: 70, origin: { y: 0.6, x: 0.5 } });
        // Fade out overlay and show main content
        surpriseOverlay.style.opacity = '0';
        setTimeout(() => {
          surpriseOverlay.style.display = 'none';
          mainContent.style.opacity = '1';
          mainContent.style.transform = 'translateY(0)';
          startAnimation();
        }, 1000);
      });

      // ---------- Animation Functions ----------
      function startBirthday() {
        setInterval(() => confetti({ particleCount: 20, spread: 45, origin: { y: 0.7, x: Math.random() } }), 3000);
        setInterval(createFloatingItem('🎈'), 1500);
      }

      function startDiwali() {
        const fireworkColors = ['#f39c12', '#e74c3c', '#f1c40f', '#ff6348'];
        function fireworks() {
          confetti({
            particleCount: 80,
            spread: 100,
            origin: { x: 0.5, y: 0.4 },
            angle: 270,
            startVelocity: 55,
            colors: fireworkColors,
            shapes: ['circle', 'star']
          });
        }
        fireworks();
        setInterval(fireworks, 2500);
        setInterval(createFloatingItem('🪔'), 2000);
      }

      function startChristmas() {
        function createSnow() {
          const snow = document.createElement('div');
          snow.className = 'snowflake';
          snow.textContent = '❄️';
          snow.style.left = Math.random() * 100 + '%';
          snow.style.animationDuration = Math.random() * 5 + 5 + 's';
          snow.style.fontSize = Math.random() * 1.5 + 1 + 'rem';
          document.body.appendChild(snow);
          setTimeout(() => snow.remove(), 10000);
        }
        setInterval(createSnow, 200);
        setInterval(() => confetti({ particleCount: 10, spread: 30, origin: { y: 0.2, x: Math.random() }, colors: ['#ffffff'], shapes: ['circle'], gravity: 0.5 }), 4000);
      }

      function startRomantic() {
        setInterval(createFloatingItem('❤️'), 1000);
        setInterval(() => confetti({ particleCount: 15, spread: 35, origin: { y: 0.5, x: Math.random() }, colors: ['#ff758c', '#ff7eb3'], shapes: ['heart'] }), 2500);
      }

      function startFestival() {
        setInterval(() => confetti({ particleCount: 20, spread: 45, origin: { y: 0.6, x: Math.random() }, colors: ['#f1c40f', '#e67e22', '#2ecc71'] }), 3000);
        setInterval(createFloatingItem('🌺'), 2000);
      }

      function startDefault() {
        setInterval(() => confetti({ particleCount: 15, spread: 40, origin: { y: 0.6, x: Math.random() }, colors: ['#a29bfe', '#6c5ce7'], shapes: ['star'] }), 3000);
      }

      function createFloatingItem(emoji) {
        return () => {
          const item = document.createElement('div');
          item.className = 'floating-item';
          item.textContent = emoji;
          item.style.left = Math.random() * 100 + '%';
          item.style.animationDuration = Math.random() * 6 + 6 + 's';
          item.style.fontSize = Math.random() * 2 + 2 + 'rem';
          document.body.appendChild(item);
          setTimeout(() => item.remove(), 10000);
        };
      }

      // ---------- Custom Audio Player ----------
      if (audioUrl) {
        audioPlayerDiv.classList.remove('hidden');
        audioEl.src = audioUrl;
        let loading = false;

        function updateTimeDisplay() {
          if (audioEl.duration) {
            const percent = (audioEl.currentTime / audioEl.duration) * 100;
            progressFill.style.width = percent + '%';
            currentTimeSpan.textContent = formatTime(audioEl.currentTime);
            durationSpan.textContent = formatTime(audioEl.duration);
          }
        }

        function formatTime(sec) {
          if (isNaN(sec)) return '0:00';
          const m = Math.floor(sec / 60);
          const s = Math.floor(sec % 60);
          return `${m}:${s < 10 ? '0' : ''}${s}`;
        }

        playBtn.addEventListener('click', () => {
          audioEl.paused ? audioEl.play() : audioEl.pause();
        });

        audioEl.addEventListener('play', () => {
          playBtn.innerHTML = '<i class="fas fa-pause"></i>';
          loading = false;
          loadingIndicator.classList.add('hidden');
        });
        audioEl.addEventListener('pause', () => {
          playBtn.innerHTML = '<i class="fas fa-play"></i>';
        });
        audioEl.addEventListener('waiting', () => {
          loading = true;
          loadingIndicator.classList.remove('hidden');
          playBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i>';
        });
        audioEl.addEventListener('playing', () => {
          loading = false;
          loadingIndicator.classList.add('hidden');
          playBtn.innerHTML = '<i class="fas fa-pause"></i>';
        });
        audioEl.addEventListener('timeupdate', updateTimeDisplay);
        audioEl.addEventListener('loadedmetadata', () => {
          durationSpan.textContent = formatTime(audioEl.duration);
        });
        progressBarContainer.addEventListener('click', (e) => {
          const rect = progressBarContainer.getBoundingClientRect();
          const clickX = e.clientX - rect.left;
          const width = rect.width;
          if (audioEl.duration) {
            audioEl.currentTime = (clickX / width) * audioEl.duration;
          }
        });
      }
    })();
  </script>
</body>
</html>
