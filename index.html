<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Your Special Surprise</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Google Fonts: Great Vibes for Name, Poppins for Text -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
  
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Canvas Confetti -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <style>
    /* Base Styles */
    body {
      font-family: 'Poppins', sans-serif;
      margin: 0;
      padding: 0;
      overflow-x: hidden;
      background-color: #111; /* Fallback dark color */
      color: #ffffff;
    }

    .font-cursive {
      font-family: 'Great Vibes', cursive;
    }

    /* Dynamic Background Container */
    #bg-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      z-index: -2;
      transition: background 1s ease-in-out;
    }

    /* Dark Overlay for Text Readability */
    #bg-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      z-index: -1;
    }

    /* Glassmorphism Card */
    .glass-card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
    }

    /* Polaroid Image Frame */
    .polaroid {
      background: #ffffff;
      padding: 15px 15px 50px 15px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
      transform: rotate(-3deg);
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      max-width: 320px;
      margin: 0 auto;
      position: relative;
    }
    
    .polaroid:hover {
      transform: rotate(0deg) scale(1.03);
    }

    .polaroid img {
      width: 100%;
      height: auto;
      border-radius: 4px;
      display: block;
    }

    .polaroid-text {
      position: absolute;
      bottom: 10px;
      left: 0;
      right: 0;
      text-align: center;
      color: #1a1a1a;
      font-size: 1.8rem;
    }

    /* Custom Audio Player */
    .audio-player-glass {
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: inset 0 0 10px rgba(255,255,255,0.05);
    }

    .progress-bar {
      background: rgba(255, 255, 255, 0.2);
      cursor: pointer;
    }

    .progress-fill {
      background: linear-gradient(90deg, #d4af37, #ffdf00);
      box-shadow: 0 0 10px rgba(255, 223, 0, 0.5);
    }

    /* Animations */
    #surprise-screen {
      transition: opacity 0.8s ease, visibility 0.8s;
    }

    #main-content {
      opacity: 0;
      transform: translateY(30px) scale(0.95);
      transition: all 1s cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    #main-content.visible {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    .glow-text {
      text-shadow: 0 0 20px rgba(255, 255, 255, 0.6), 0 0 40px rgba(255, 255, 255, 0.3);
    }

    .gift-bounce {
      animation: bounceGift 2s infinite;
    }

    @keyframes bounceGift {
      0%, 100% { transform: translateY(0) scale(1); filter: drop-shadow(0 0 15px rgba(255,215,0,0.6)); }
      50% { transform: translateY(-20px) scale(1.05); filter: drop-shadow(0 0 30px rgba(255,215,0,0.9)); }
    }
  </style>
</head>
<body>

  <!-- Dynamic Backgrounds -->
  <div id="bg-container"></div>
  <div id="bg-overlay"></div>

  <!-- Surprise / Loading Screen -->
  <div id="surprise-screen" class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-black/95 backdrop-blur-xl">
    <div class="cursor-pointer text-center group" onclick="openSurprise()">
      <i class="fas fa-gift text-8xl text-yellow-500 gift-bounce mb-8 group-hover:text-yellow-300 transition-colors"></i>
      <h2 class="text-3xl md:text-5xl font-semibold tracking-wider text-white glow-text">Your Surprise is Ready!</h2>
      <p class="mt-4 text-xl text-gray-400 group-hover:text-white transition-colors">Tap anywhere to open</p>
    </div>
  </div>

  <!-- Main Greeting Content -->
  <div id="main-content" class="min-h-screen flex items-center justify-center p-4 md:p-10 pointer-events-none">
    
    <!-- Premium Glass Card -->
    <div class="glass-card rounded-3xl p-8 md:p-14 w-full max-w-6xl mx-auto flex flex-col lg:flex-row items-center gap-12 pointer-events-auto relative overflow-hidden">
      
      <!-- Left Column: Image (Hidden if no image) -->
      <div id="img-container" class="hidden w-full lg:w-5/12 flex justify-center z-10">
        <div class="polaroid">
          <img id="user-img" src="" alt="Memory">
          <div class="polaroid-text font-cursive font-bold" id="polaroid-name">Name</div>
        </div>
      </div>

      <!-- Right Column: Text & Audio -->
      <div id="text-container" class="w-full flex flex-col justify-center text-center lg:text-left z-10">
        <p id="occ-label" class="text-yellow-500 font-semibold tracking-[0.4em] uppercase text-sm md:text-lg mb-2 drop-shadow-md"></p>
        
        <h1 id="name-label" class="font-cursive text-7xl md:text-9xl text-white glow-text leading-tight mb-6 mt-2">
          Name
        </h1>
        
        <p id="msg-label" class="text-lg md:text-2xl text-gray-200 font-light leading-relaxed mb-10 max-w-2xl mx-auto lg:mx-0">
          Message goes here...
        </p>

        <!-- Custom Audio Player (Hidden if no audio) -->
        <div id="audio-container" class="hidden w-full max-w-md mx-auto lg:mx-0 audio-player-glass rounded-full p-3 flex items-center gap-4">
          <button id="play-btn" class="w-12 h-12 rounded-full bg-gradient-to-r from-yellow-600 to-yellow-400 text-black flex items-center justify-center text-xl hover:scale-105 transition-transform shadow-[0_0_15px_rgba(255,215,0,0.5)]">
            <i class="fas fa-play" id="play-icon"></i>
          </button>
          
          <div class="flex-1">
            <div id="progress-container" class="progress-bar h-2 rounded-full relative w-full">
              <div id="progress-fill" class="progress-fill absolute top-0 left-0 h-full w-0 rounded-full transition-all duration-100"></div>
            </div>
            <div class="flex justify-between text-xs text-gray-400 mt-2 font-medium">
              <span id="time-current">0:00</span>
              <span id="time-total">0:00</span>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <audio id="audio-player" src=""></audio>

  <script>
    // --- 1. URL Parsing & Validation ---
    const urlParams = new URLSearchParams(window.location.search);
    const uName = urlParams.get('name');
    const uMsg = urlParams.get('msg');
    
    // Redirect if required parameters are missing
    if (!uName || !uMsg) {
      window.location.href = "https://example.com"; 
    }

    const uOcc = urlParams.get('occ') || 'Special Day';
    const uTheme = urlParams.get('theme') || '';
    const uImg = urlParams.get('img');
    const uAudio = urlParams.get('audio');

    // --- 2. Populate Data ---
    document.getElementById('polaroid-name').textContent = uName;
    document.getElementById('name-label').textContent = uName;
    document.getElementById('occ-label').textContent = uOcc;
    document.getElementById('msg-label').textContent = uMsg;

    const imgContainer = document.getElementById('img-container');
    const textContainer = document.getElementById('text-container');
    
    if (uImg) {
      document.getElementById('user-img').src = uImg;
      imgContainer.classList.remove('hidden');
      textContainer.classList.add('lg:w-7/12');
    } else {
      textContainer.classList.add('lg:text-center', 'items-center');
    }

    // --- 3. Dynamic Themes Engine (WITH SOLID FALLBACKS) ---
    const bgContainer = document.getElementById('bg-container');
    let activeAnimation = null;

    function setTheme() {
      const occLower = uOcc.toLowerCase();
      
      // Fallback colors ensures no black screen even if image fails or loads slow
      let fallbackColor = "#111111"; 
      let bgImageUrl = "";

      if (occLower.includes('birthday')) {
        fallbackColor = "linear-gradient(135deg, #2a0845, #6441A5)";
        bgImageUrl = "https://images.unsplash.com/photo-1530103862676-de8892bf3040?q=80&w=1200&auto=format&fit=crop";
        activeAnimation = () => {
          const duration = 15 * 1000;
          const end = Date.now() + duration;
          (function frame() {
            confetti({ particleCount: 4, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#ff0000', '#ffd700'] });
            confetti({ particleCount: 4, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#ff0000', '#ffd700'] });
            if (Date.now() < end) requestAnimationFrame(frame);
          }());
        };
      } 
      else if (occLower.includes('diwali')) {
        fallbackColor = "linear-gradient(135deg, #3E0000, #FF4500)";
        bgImageUrl = "https://images.unsplash.com/photo-1505489435671-80a165c60816?q=80&w=1200&auto=format&fit=crop";
        activeAnimation = () => {
          const duration = 15 * 1000;
          const end = Date.now() + duration;
          (function frame() {
            confetti({ particleCount: 5, spread: 100, origin: { y: Math.random() - 0.2, x: Math.random() }, colors: ['#ff8c00', '#ffd700', '#ffffff'], startVelocity: 30 });
            if (Date.now() < end) requestAnimationFrame(frame);
          }());
        };
      }
      else if (occLower.includes('christmas') || occLower.includes('new year')) {
        fallbackColor = "linear-gradient(135deg, #0f2027, #203a43)";
        bgImageUrl = "https://images.unsplash.com/photo-1512389142860-9c449e58a543?q=80&w=1200&auto=format&fit=crop";
        activeAnimation = () => {
          const duration = 15 * 1000;
          const end = Date.now() + duration;
          (function frame() {
            confetti({ particleCount: 3, spread: 70, origin: { y: -0.1, x: Math.random() }, colors: ['#ffffff'], shapes: ['circle'], gravity: 0.5 });
            if (Date.now() < end) requestAnimationFrame(frame);
          }());
        };
      }
      else if (occLower.includes('anniversary') || occLower.includes('wedding') || occLower.includes('valentine')) {
        fallbackColor = "linear-gradient(135deg, #4a0e1c, #801336)";
        bgImageUrl = "https://images.unsplash.com/photo-1518199268839-49f749445d0b?q=80&w=1200&auto=format&fit=crop";
        activeAnimation = () => {
          confetti({ particleCount: 150, spread: 100, origin: { y: 0.6 }, colors: ['#ff0040', '#ffb3c6', '#ffffff'] });
        };
      }
      else {
        // Premium Dark Default
        fallbackColor = "linear-gradient(135deg, #141e30, #243b55)";
        bgImageUrl = "https://images.unsplash.com/photo-1557682224-5b8590cd9ec5?q=80&w=1200&auto=format&fit=crop";
        activeAnimation = () => {
          confetti({ particleCount: 100, spread: 90, origin: { y: 0.6 }, colors: ['#d4af37', '#ffffff'] });
        };
      }

      // Apply the fallback gradient AND the image. 
      // If image loads, it covers the gradient. If slow, gradient shows instantly!
      bgContainer.style.background = `${fallbackColor}`;
      bgContainer.style.backgroundImage = `url('${bgImageUrl}')`;
    }
    setTheme();

    // --- 4. Surprise Screen Interaction ---
    function openSurprise() {
      const surpriseScreen = document.getElementById('surprise-screen');
      const mainContent = document.getElementById('main-content');
      
      surpriseScreen.style.opacity = '0';
      setTimeout(() => {
        surpriseScreen.style.visibility = 'hidden';
        mainContent.classList.add('visible');
        if(activeAnimation) activeAnimation();
      }, 800);
    }

    // --- 5. Custom Audio Player Logic ---
    if (uAudio) {
      const audioContainer = document.getElementById('audio-container');
      const audioPlayer = document.getElementById('audio-player');
      const playBtn = document.getElementById('play-btn');
      const playIcon = document.getElementById('play-icon');
      const progressContainer = document.getElementById('progress-container');
      const progressFill = document.getElementById('progress-fill');
      const timeCurrent = document.getElementById('time-current');
      const timeTotal = document.getElementById('time-total');

      audioContainer.classList.remove('hidden');
      audioPlayer.src = uAudio;

      function formatTime(seconds) {
        if (isNaN(seconds)) return "0:00";
        const m = Math.floor(seconds / 60);
        const s = Math.floor(seconds % 60);
        return `${m}:${s < 10 ? '0' : ''}${s}`;
      }

      audioPlayer.addEventListener('loadedmetadata', () => {
        timeTotal.textContent = formatTime(audioPlayer.duration);
      });

      audioPlayer.addEventListener('timeupdate', () => {
        const percent = (audioPlayer.currentTime / audioPlayer.duration) * 100;
        progressFill.style.width = `${percent}%`;
        timeCurrent.textContent = formatTime(audioPlayer.currentTime);
      });

      playBtn.addEventListener('click', () => {
        if (audioPlayer.paused) {
          audioPlayer.play();
          playIcon.className = 'fas fa-pause';
        } else {
          audioPlayer.pause();
          playIcon.className = 'fas fa-play ml-1';
        }
      });

      audioPlayer.addEventListener('waiting', () => {
        playIcon.className = 'fas fa-spinner fa-spin';
      });

      audioPlayer.addEventListener('playing', () => {
        playIcon.className = 'fas fa-pause';
      });

      progressContainer.addEventListener('click', (e) => {
        const rect = progressContainer.getBoundingClientRect();
        const pos = (e.clientX - rect.left) / rect.width;
        audioPlayer.currentTime = pos * audioPlayer.duration;
      });
    }
  </script>
</body>
</html>
