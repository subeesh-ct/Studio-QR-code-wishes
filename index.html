<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>WishLink Studio · Your Surprise</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- canvas-confetti -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1/dist/confetti.browser.min.js"></script>

  <style>
    :root {
      --accent: #a78bfa; /* default soft purple */
      --accent-dark: #7c3aed;
    }
    body {
      font-family: 'Poppins', sans-serif;
      overflow-x: hidden;
    }
    .font-cursive {
      font-family: 'Great Vibes', cursive;
    }
    .text-glow {
      text-shadow: 0 0 20px rgba(167, 139, 250, 0.4);
    }
    /* 3D geometric floating elements */
    .floating-sphere {
      position: fixed;
      border-radius: 50%;
      opacity: 0.15;
      background: radial-gradient(circle at 30% 30%, #fff, var(--accent));
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
      animation: floatSphere 12s infinite ease-in-out;
      pointer-events: none;
      z-index: 1;
    }
    @keyframes floatSphere {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-30px) rotate(10deg); }
    }
    /* Polaroid frame */
    .polaroid {
      background: white;
      padding: 0.8rem 0.8rem 2.5rem 0.8rem;
      box-shadow: 0 30px 45px rgba(0,0,0,0.15);
      transform: rotate(-1.5deg);
      transition: transform 0.3s ease;
      border-radius: 1rem;
    }
    .polaroid:hover {
      transform: rotate(0deg) scale(1.02);
    }
    .polaroid img {
      width: 100%;
      height: auto;
      border-radius: 0.75rem;
      display: block;
    }
    .name-overlay {
      position: absolute;
      bottom: 0.3rem;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(6px);
      color: white;
      padding: 0.25rem 1.5rem;
      border-radius: 9999px;
      font-size: 1.6rem;
      white-space: nowrap;
    }
    /* Progress bar */
    .progress-fill {
      background: linear-gradient(90deg, var(--accent), var(--accent-dark));
      box-shadow: 0 0 8px var(--accent);
    }
    /* Surprise overlay */
    @keyframes softPulse {
      0%, 100% { transform: scale(1); opacity: 0.9; }
      50% { transform: scale(1.05); opacity: 1; }
    }
    .gift-icon {
      animation: softPulse 3s infinite ease-in-out;
      filter: drop-shadow(0 10px 15px rgba(0,0,0,0.3));
      color: #f9a8d4; /* soft pink */
    }
    /* Audio player custom */
    .play-btn {
      transition: all 0.2s;
    }
    .play-btn:hover {
      transform: scale(1.05);
      background-color: var(--accent-dark);
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center relative bg-gradient-to-br from-indigo-100 via-purple-50 to-pink-100">
  <!-- Floating 3D spheres (decorative) -->
  <div class="floating-sphere w-64 h-64 -top-20 -left-20" style="animation-delay: 0s; --accent: #c4b5fd;"></div>
  <div class="floating-sphere w-48 h-48 top-1/3 right-0" style="animation-delay: 4s; --accent: #fbcfe8;"></div>
  <div class="floating-sphere w-56 h-56 bottom-0 left-1/2" style="animation-delay: 8s; --accent: #ddd6fe;"></div>

  <!-- Surprise Overlay -->
  <div id="surpriseOverlay" class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-black/30 backdrop-blur-sm cursor-pointer transition-all duration-1000">
    <div class="gift-icon text-8xl">
      <i class="fas fa-gift"></i>
    </div>
    <p class="text-white text-3xl md:text-4xl font-semibold tracking-wide text-center px-4 mt-6" style="text-shadow: 0 2px 10px rgba(0,0,0,0.5);">
      Your Surprise is Ready.<br>
      <span class="text-xl font-normal mt-2 block opacity-90">Tap to Open</span>
    </p>
  </div>

  <!-- Main Content (hidden initially) -->
  <div id="mainContent" class="relative z-10 w-full max-w-7xl mx-auto px-4 py-12 opacity-0 transition-all duration-1000 transform translate-y-6">
    <div class="flex flex-col md:flex-row items-center justify-between gap-8">
      <!-- Image Column (Polaroid) -->
      <div id="imageCol" class="md:w-1/2 w-full flex justify-center mb-8 md:mb-0 hidden">
        <div class="polaroid relative max-w-xs md:max-w-sm mx-auto">
          <img id="polaroidImg" src="" alt="Surprise Image">
          <div class="name-overlay font-cursive" id="polaroidName"></div>
        </div>
      </div>

      <!-- Text & Audio Column -->
      <div id="textCol" class="md:w-1/2 w-full flex flex-col space-y-6 text-center md:text-left">
        <p id="occasionText" class="text-lg uppercase tracking-[0.3em] font-semibold" style="color: var(--accent)"></p>
        <h1 id="nameText" class="font-cursive text-7xl md:text-8xl text-gray-800 text-glow leading-tight"></h1>
        <p id="messageText" class="text-xl md:text-2xl text-gray-700 leading-relaxed font-medium"></p>

        <!-- Custom Audio Player -->
        <div id="audioPlayer" class="hidden mt-6 flex items-center gap-4 bg-white/70 backdrop-blur-lg border border-white/40 rounded-full py-3 px-5 w-full max-w-md mx-auto md:mx-0 shadow-xl shadow-purple-200/50">
          <button id="playBtn" class="play-btn rounded-full w-12 h-12 flex items-center justify-center text-2xl text-white shadow-md" style="background-color: var(--accent);">
            <i class="fas fa-play"></i>
          </button>
          <div class="flex-1 h-2 bg-gray-200 rounded-full cursor-pointer relative overflow-hidden" id="progressBarContainer">
            <div class="absolute top-0 left-0 h-full rounded-full progress-fill transition-all duration-150" id="progressFill" style="width:0%"></div>
          </div>
          <div class="text-gray-700 text-sm font-semibold flex items-center gap-1">
            <span id="currentTime">0:00</span><span>/</span><span id="duration">0:00</span>
          </div>
          <div id="loadingIndicator" class="hidden text-gray-600 text-sm ml-2">
            <i class="fas fa-spinner fa-pulse"></i> Loading...
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Hidden Audio -->
  <audio id="audioElement" preload="auto"></audio>

  <script>
    (function() {
      // ---------- URL Parsing & Redirect ----------
      const params = new URLSearchParams(window.location.search);
      const name = params.get('name');
      const msg = params.get('msg');
      if (!name || !msg) {
        window.location.href = 'https://example.com';
        return;
      }
      const occasion = params.get('occ') || 'Custom';
      const theme = params.get('theme') || '';
      const imgUrl = params.get('img') || null;
      const audioUrl = params.get('audio') || null;

      // ---------- DOM Elements ----------
      const body = document.body;
      const surpriseOverlay = document.getElementById('surpriseOverlay');
      const mainContent = document.getElementById('mainContent');
      const imageCol = document.getElementById('imageCol');
      const polaroidImg = document.getElementById('polaroidImg');
      const polaroidName = document.getElementById('polaroidName');
      const occasionText = document.getElementById('occasionText');
      const nameText = document.getElementById('nameText');
      const messageText = document.getElementById('messageText');
      const audioPlayerDiv = document.getElementById('audioPlayer');
      const audioEl = document.getElementById('audioElement');
      const playBtn = document.getElementById('playBtn');
      const progressFill = document.getElementById('progressFill');
      const progressBarContainer = document.getElementById('progressBarContainer');
      const currentTimeSpan = document.getElementById('currentTime');
      const durationSpan = document.getElementById('duration');
      const loadingIndicator = document.getElementById('loadingIndicator');

      // ---------- Populate Data ----------
      polaroidName.textContent = name;
      nameText.textContent = name;
      occasionText.textContent = occasion.toUpperCase();
      messageText.textContent = msg;

      if (imgUrl) {
        imageCol.classList.remove('hidden');
        polaroidImg.src = imgUrl;
      } else {
        // If no image, make text column full width and center
        document.getElementById('textCol').classList.remove('md:w-1/2');
        document.getElementById('textCol').classList.add('md:w-full', 'text-center', 'items-center');
      }

      // ---------- Dynamic Occasion Theme ----------
      const occasionPalette = {
        'birthday': { gradient: 'from-purple-100 via-pink-50 to-yellow-50', accent: '#c084fc', accentDark: '#a855f7' },
        'anniversary': { gradient: 'from-rose-100 via-pink-50 to-amber-50', accent: '#f472b6', accentDark: '#db2777' },
        'wedding': { gradient: 'from-pink-100 via-rose-50 to-indigo-50', accent: '#f9a8d4', accentDark: '#ec4899' },
        'valentine\'s day': { gradient: 'from-red-50 via-pink-100 to-rose-200', accent: '#f43f5e', accentDark: '#be123c' },
        'graduation': { gradient: 'from-blue-50 via-indigo-100 to-purple-100', accent: '#6366f1', accentDark: '#4f46e5' },
        'farewell': { gradient: 'from-teal-50 via-cyan-100 to-blue-100', accent: '#0d9488', accentDark: '#0f766e' },
        "mother's day": { gradient: 'from-pink-50 via-rose-100 to-orange-50', accent: '#f43f5e', accentDark: '#be123c' },
        "father's day": { gradient: 'from-sky-50 via-blue-100 to-indigo-100', accent: '#3b82f6', accentDark: '#1d4ed8' },
        'diwali': { gradient: 'from-amber-50 via-yellow-100 to-orange-50', accent: '#f59e0b', accentDark: '#b45309' },
        'pongal': { gradient: 'from-yellow-50 via-amber-100 to-green-50', accent: '#eab308', accentDark: '#a16207' },
        'eid': { gradient: 'from-green-50 via-emerald-100 to-teal-100', accent: '#10b981', accentDark: '#047857' },
        'christmas': { gradient: 'from-red-50 via-rose-100 to-green-50', accent: '#dc2626', accentDark: '#991b1b' },
        'new year': { gradient: 'from-violet-50 via-purple-100 to-fuchsia-100', accent: '#8b5cf6', accentDark: '#6d28d9' },
        'congratulations': { gradient: 'from-emerald-50 via-teal-100 to-cyan-100', accent: '#14b8a6', accentDark: '#0f766e' },
        'get well soon': { gradient: 'from-cyan-50 via-sky-100 to-blue-100', accent: '#0ea5e9', accentDark: '#0369a1' },
        'custom': { gradient: 'from-indigo-50 via-purple-50 to-pink-100', accent: '#a78bfa', accentDark: '#7c3aed' }
      };

      const occKey = Object.keys(occasionPalette).find(k => k === occasion.toLowerCase()) || 'custom';
      const palette = occasionPalette[occKey];

      // Apply gradient background and accent colors
      body.className = `min-h-screen flex items-center justify-center relative overflow-x-hidden bg-gradient-to-br ${palette.gradient}`;
      document.documentElement.style.setProperty('--accent', palette.accent);
      document.documentElement.style.setProperty('--accent-dark', palette.accentDark);

      // Update floating spheres colors based on accent
      const spheres = document.querySelectorAll('.floating-sphere');
      if (spheres.length > 0) {
        spheres[0].style.setProperty('--accent', palette.accentDark);
        spheres[1].style.setProperty('--accent', palette.accent);
        spheres[2].style.setProperty('--accent', palette.accentDark);
      }

      // ---------- Surprise Interaction ----------
      surpriseOverlay.addEventListener('click', () => {
        // Soft confetti burst
        confetti({
          particleCount: 100,
          spread: 60,
          origin: { y: 0.6, x: 0.5 },
          colors: [palette.accent, palette.accentDark, '#f9a8d4', '#e9d5ff']
        });
        // Fade out overlay
        surpriseOverlay.style.opacity = '0';
        setTimeout(() => {
          surpriseOverlay.style.display = 'none';
          mainContent.style.opacity = '1';
          mainContent.style.transform = 'translateY(0)';
        }, 1000);
      });

      // ---------- Custom Audio Player ----------
      if (audioUrl) {
        audioPlayerDiv.classList.remove('hidden');
        audioEl.src = audioUrl;
        let loading = false;

        function updateTimeDisplay() {
          if (audioEl.duration) {
            const percent = (audioEl.currentTime / audioEl.duration) * 100;
            progressFill.style.width = percent + '%';
            currentTimeSpan.textContent = formatTime(audioEl.currentTime);
            durationSpan.textContent = formatTime(audioEl.duration);
          }
        }

        function formatTime(sec) {
          if (isNaN(sec)) return '0:00';
          const m = Math.floor(sec / 60);
          const s = Math.floor(sec % 60);
          return `${m}:${s < 10 ? '0' : ''}${s}`;
        }

        playBtn.addEventListener('click', () => {
          audioEl.paused ? audioEl.play() : audioEl.pause();
        });

        audioEl.addEventListener('play', () => {
          playBtn.innerHTML = '<i class="fas fa-pause"></i>';
          loading = false;
          loadingIndicator.classList.add('hidden');
        });
        audioEl.addEventListener('pause', () => {
          playBtn.innerHTML = '<i class="fas fa-play"></i>';
        });
        audioEl.addEventListener('waiting', () => {
          loading = true;
          loadingIndicator.classList.remove('hidden');
          playBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i>';
        });
        audioEl.addEventListener('playing', () => {
          loading = false;
          loadingIndicator.classList.add('hidden');
          playBtn.innerHTML = '<i class="fas fa-pause"></i>';
        });
        audioEl.addEventListener('timeupdate', updateTimeDisplay);
        audioEl.addEventListener('loadedmetadata', () => {
          durationSpan.textContent = formatTime(audioEl.duration);
        });
        progressBarContainer.addEventListener('click', (e) => {
          const rect = progressBarContainer.getBoundingClientRect();
          const clickX = e.clientX - rect.left;
          const width = rect.width;
          if (audioEl.duration) {
            audioEl.currentTime = (clickX / width) * audioEl.duration;
          }
        });
      }
    })();
  </script>
</body>
</html>
